function _chartTiposResume(its, opLabel) {
  const cnt = {}
  its.forEach(i => { const t = i.tipo || 'Outro'; cnt[t] = (cnt[t]||0)+1 })
  const sorted = Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0, 9)

  const W = 900, H = 300, c = _mkC(W, H), ctx = c.getContext('2d')
  _base(ctx, W, H, `Tipos de Demanda — ${opLabel}`)

  if (!sorted.length) {
    ctx.font='14px Arial,sans-serif'; ctx.fillStyle='#9CA3AF'; ctx.textAlign='center'
    ctx.fillText('Sem dados', W/2, H/2)
    return _b64(c)
  }

  const PAD = { t:58, r:80, b:20, l:230 }
  const pw = W - PAD.l - PAD.r, ph = H - PAD.t - PAD.b
  const n = Math.min(sorted.length, 8)
  const rowH = ph / n
  const max = Math.max(...sorted.slice(0,n).map(e=>e[1]), 1)
  const STRIPE = ['#FAFAFA','#F5F3FF']

  for (let i = 0; i < n; i++) {
    const [lbl, v] = sorted[i]
    const bh = Math.min(rowH * 0.55, 22)
    const y  = PAD.t + i * rowH + (rowH - bh) / 2
    const bw = (v / max) * pw

    ctx.fillStyle = STRIPE[i % 2]
    ctx.fillRect(PAD.l, PAD.t + i * rowH, pw, rowH)

    if (bw > 0) {
      const g = ctx.createLinearGradient(PAD.l, 0, PAD.l + bw, 0)
      g.addColorStop(0, '#7C6AF7'); g.addColorStop(1, '#A89BF9')
      ctx.fillStyle = g; ctx.fillRect(PAD.l, y, bw, bh)
    }

    const lblTxt = lbl.length > 28 ? lbl.slice(0, 26) + '…' : lbl
    ctx.font='11px Arial,sans-serif'; ctx.fillStyle='#374151'; ctx.textAlign='right'
    ctx.fillText(lblTxt, PAD.l - 10, y + bh / 2 + 4)
    ctx.font='bold 11px Arial,sans-serif'; ctx.fillStyle='#1F2937'; ctx.textAlign='left'
    ctx.fillText(v, PAD.l + bw + 8, y + bh / 2 + 4)
  }

  return _b64(c)
}

function _gerarGraficos(its) {
  const years = new Set(its.map(i=>i.data&&i.data.split('/')[2]).filter(Boolean))
  const year  = [...years].sort().pop() || String(new Date().getFullYear())
  const mon   = Array(12).fill(0)
  its.forEach(i=>{ if(!i.data) return; const [,m,y]=i.data.split('/'); if(y===year) mon[parseInt(m)-1]++ })
  const cnt = (arr,key) => { const o={}; arr.forEach(i=>{const k=i[key]||'—';o[k]=(o[k]||0)+1}); return Object.entries(o).sort((a,b)=>b[1]-a[1]) }
  const tP = cnt(its,'tipo').slice(0,9), oP = cnt(its,'op').slice(0,9)
  const sL = ['Aberto','Em andamento','Resolvido','Escalado','Sem resposta']
  const sC = ['#EF4444','#F59E0B','#10B981','#F97316','#8B5CF6']
  return {
    mensal:     _chartBars(mon, ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'], `Demandas por Mês — ${year}`),
    status:     _chartDonut(sL.map(s=>its.filter(i=>i.status===s).length), sL, sC, 'Distribuição por Status'),
    tipos:      _chartHBars(tP.map(e=>e[1]), tP.map(e=>e[0]), 'Demandas por Tipo'),
    operadoras: _chartHBars(oP.map(e=>e[1]), oP.map(e=>e[0]), 'Demandas por Operadora'),
  }
}

// ── Mapeamento de nome curto das operadoras ───────────────────────────────
const OP_DISPLAY = {
  'UNIMED SA':                'SA',
  'UNIMED NOROESTE DO PARANA':'Noroeste do Paraná',
  'UNIMED NORDESTE PAULISTA': 'Nordeste Paulista',
  'UNIMED GERAIS DE MINAS':   'Gerais de Minas',
  'UNIMED MISSÕES':           'Missões/RS',
  'UNIMED CAMPOS':            'Campos',
  'UNIMED FRANCA':            'Franca',
  'UNIMED JUIZ DE FORA':      'Juiz de Fora',
  'UNIMED SANTA MARIA':       'Santa Maria',
  'UNIMED ENCOSTA DA SERRA':  'Encosta da Serra',
  'CÍRCULO SAÚDE':            'Círculo Saúde',
}

const MESES_F = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                 'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']

function mesAnoFromYM(selectedYM) {
  if (!selectedYM) return { mes: 'Completo', ano: String(new Date().getFullYear()) }
  const [y, m] = selectedYM.split('-')
  return { mes: MESES_F[parseInt(m) - 1], ano: y }
}

// Monta o objeto de dados de UMA operadora — usado tanto pelo "Gerar
// Fechamento" individual quanto pelo "Fechamento Completo", pra nunca
// duplicar a lógica de agrupamento por tipo.
function buildFechamentoDataFor(op, selectedYM, mes, ano) {
  let filtered = items.filter(i => i.op === op)
  if (selectedYM) {
    const [y, m] = selectedYM.split('-')
    filtered = filtered.filter(i => {
      if (!i.data) return false
      const p = i.data.split('/')
      return p[1] === m && p[2] === y
    })
  }
  const cnt = {}
  filtered.forEach(i => { const t = i.tipo || 'Outro'; cnt[t] = (cnt[t] || 0) + 1 })
  const tipos = Object.entries(cnt).sort((a, b) => b[1] - a[1]).map(([tipo, count]) => ({ tipo, count }))
  return {
    op,
    opDisplay: OP_DISPLAY[op] || op.replace(/^UNIMED\s+/i, ''),
    mes, ano,
    total: filtered.length,
    tipos,
  }
}

async function gerarFechamento() {
  const op = document.getElementById('dash-op').value
  if (!op) { showToast('Selecione uma operadora no filtro primeiro.', 'info'); return }

  const selectedYM = document.getElementById('dash-month').value
  const { mes, ano } = mesAnoFromYM(selectedYM)
  const data = buildFechamentoDataFor(op, selectedYM, mes, ano)
  if (!data.total) { showToast('Sem dados para essa operadora no período.', 'info'); return }

  await window.csApp.openFechamento(data)
}

// Operadoras que ainda não devem entrar no Fechamento Completo (ex.: sem
// demandas sendo registradas ainda). Continuam disponíveis pra registro
// individual e pro "Gerar Fechamento" avulso — só saem do arquivo completo.
const EXCLUIR_DO_COMPLETO = ['UNIMED JUIZ DE FORA']

// Operadoras "registradas no app" = as opções do <select> de operadora do
// formulário (única lista existente hoje — reaproveitada em vez de
// hardcodar uma lista nova). Círculo Saúde sempre por último, como pedido;
// as demais mantêm a ordem já definida nesse <select>.
function operadorasRegistradas() {
  const opts = [...document.querySelectorAll('#f-op option')].map(o => o.value)
    .filter(Boolean)
    .filter(op => !EXCLUIR_DO_COMPLETO.includes(op))
  const semCirculo = opts.filter(o => o !== 'CÍRCULO SAÚDE')
  return opts.includes('CÍRCULO SAÚDE') ? [...semCirculo, 'CÍRCULO SAÚDE'] : semCirculo
}

async function gerarFechamentoCompleto() {
  const selectedYM = document.getElementById('dash-month').value
  if (!selectedYM) { showToast('Selecione um mês específico no filtro de período primeiro.', 'info'); return }
  const { mes, ano } = mesAnoFromYM(selectedYM)

  const operadoras = operadorasRegistradas().map(op => buildFechamentoDataFor(op, selectedYM, mes, ano))
  if (!operadoras.length) { showToast('Nenhuma operadora cadastrada.', 'info'); return }

  await window.csApp.openFechamentoCompleto({ mes, ano, operadoras })
}

async function loadExportFolderHint() {
  const folder = await window.csApp.getExportFolder()
  const el = document.getElementById('export-folder-hint')
  if (!el) return
  if (folder) {
    const parts = folder.replace(/\\/g, '/').split('/')
    const short = parts.slice(-2).join('/')
    el.textContent = '📂 ' + short
    el.title = folder
  } else {
    el.textContent = 'Pasta: padrão (clique 📁 para configurar)'
  }
}

async function configExportFolder() {
  const folder = await window.csApp.chooseExportFolder()
  if (folder) {
    showToast('✓ Pasta configurada: ' + folder.split(/[\\/]/).slice(-1)[0], 'success')
    loadExportFolderHint()
  }
}

async function exportXLSX() {
  if (!items.length) { showToast('Nenhum dado para exportar.', 'info'); return }
  showToast('Gerando Excel…', 'info', 8000)
  try {
    const mes = document.getElementById('filter-month').value
    const exportItems = getFilteredItems()
    const charts = _gerarGraficos(exportItems)
    const result = await window.csApp.exportExcel({ items: exportItems, allItems: items, mes, charts })
    if (result && result.ok === false) {
      showToast('Erro ao gerar Excel: ' + (result.error || 'desconhecido'), 'error', 8000)
    } else if (result && result.ok) {
      showToast(result.gdrive ? '☁️ Excel salvo no Google Drive!' : '✓ Excel salvo com sucesso!', 'success')
    }
  } catch (e) {
    showToast('Erro inesperado: ' + e.message, 'error', 8000)
  }
}

async function backupJSON() {
  if (!items.length) { alert('Nenhum dado para exportar.'); return }
  const result = await window.csApp.backup(items)
  if (result.ok)
    showToast(`✓ Backup salvo — ${result.arquivo} (${result.total} demandas)`, 'success')
  else
    showToast('Erro ao salvar o backup: ' + (result.error || ''), 'error')
}

async function restoreJSON() {
  const data = await window.csApp.restore()
  if (!data) return
  const msg = items.length
    ? `Substituir ${items.length} registro(s) atual(is) por ${data.length} do backup?\n\nClique OK para confirmar.`
    : `Importar ${data.length} registro(s) do backup?`
  if (!confirm(msg)) return
  items = data
  save(); render()
  showToast(`✓ ${data.length} demanda${data.length !== 1 ? 's' : ''} restaurada${data.length !== 1 ? 's' : ''}!`, 'success')
}

;(async () => {
  await load()
  render()
  loadExportFolderHint()
  scheduleEndOfDay()
  // Notifica demandas abertas há mais de 1 dia
  try {
    const now = new Date()
    const overdue = items.filter(i => {
      if (i.status !== 'Em andamento' || !i.data) return false
      const [d, m, y] = i.data.split('/')
      return (now - new Date(y, m-1, d)) / 86400000 >= 1
    })
    if (overdue.length && window.csApp?.notify) {
      window.csApp.notify({
        title: `⚠ ${overdue.length} demanda${overdue.length !== 1 ? 's' : ''} em atraso`,
        body: overdue.slice(0,3).map(i => `• ${i.ben || i.tipo || '—'} (${i.op})`).join('\n')
           + (overdue.length > 3 ? `\n…e mais ${overdue.length - 3}` : ''),
      })
    }
  } catch { /* silencioso */ }
})()
</script>
